<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 120px;
      color: #38bdf8;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      padding: 12px 20px;
      background: #38bdf8;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      background: #0ea5e9;
      color: #fff;
    }

    .emoji {
      font-size: 50px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="emoji">🚫</div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Short Url Does Not Exist Please Use Correct Url</p>
    <a href="/">Go Back Home</a>
  </div>

</body>
</html>
